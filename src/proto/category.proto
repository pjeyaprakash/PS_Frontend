syntax = "proto3";

package category;

message category {
  int32 id = 1;
  string category = 2;
  repeated string value = 3;
}

message CategoryGetResponse {
  repeated category categories = 1;
}

message AddCategoryRequest {
  string category = 1;
  repeated string value = 2;
}

message AddCategoryResponse {
  int32 id = 1;
}