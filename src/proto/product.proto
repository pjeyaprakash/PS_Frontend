syntax = "proto3";

package product;


message Variant {
  string id = 1;
  string name = 2;

  int32 price = 3;
  int32 qty = 4;

  map<string, string> attrs = 6;
}

message Product {
  string name = 1;
  string description = 2;
  string category = 3;

  int32 total_quantity = 4;
  double total_value = 5;
  int32 variant_count = 6;

  repeated Variant variants = 7;
}



message ProductList {
  int32 id = 1;
  string name = 2;
  string category = 3;
  int32 total_quantity = 4;
  int32 total_value = 5;
  int32 variant_count = 6;
  int64 total = 7;
  int64 total_unit = 8;
  int64 inventory_value = 9;
  int64 total_variant = 10;
}

message ProductListResponse {
  repeated ProductList products = 1;
}




message SingleProduct {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  int32 total_quantity = 5;
  int32 total_value = 6;
  int32 variant_count = 7;
}
message ProductVariants {
  int32 sn = 1;
  string id = 2;
  int32 product_id = 3;
  string product_name = 4;
  string name = 5;
  int32 price = 6;
  int32 qty = 7;
  int32 value = 8;
  map<string, string> attrs = 9;
}
message ProductResponse {
  SingleProduct product = 1;
  repeated ProductVariants variants = 2;
}